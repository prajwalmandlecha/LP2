<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Gadgets Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Welcome to Tech G-Store</h1>
        <p>Your one-stop shop for the latest gadgets and electronics.</p>
    </header>
    
    <main>
        <section class="products">
            <h2>Our Featured Products</h2>
            <p>Explore our wide range of laptops, smartphones, and accessories.</p>
            <!-- Sample content -->
            <div class="product-card">Laptop Pro X</div>
            <div class="product-card">Smartphone Z</div>
            <div class="product-card">Wireless Earbuds</div>
        </section>
    </main>

    <!-- Chatbot Widget -->
    <div id="chatbot-container">
        <div id="chat-header">
            <span>Customer Support Bot</span>
        </div>
        <div id="chat-window">
            <div class="message bot-message">Hello! Welcome to Tech G-Store. How can I help you today?</div>
        </div>
        <div id="chat-input-area">
            <input type="text" id="user-input" placeholder="Type your message here..." />
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="chatbot.js"></script>
</body>
</html>
